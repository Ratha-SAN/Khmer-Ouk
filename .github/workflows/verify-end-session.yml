name: Verify End Session + presence/offline UI (one-off)
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.47.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Two real guest clients quick-match, then test End Session and presence offline
        run: |
          cat > test.js <<'EOF'
          const { chromium } = require('playwright');

          async function loginAsGuest(context, label) {
            const page = await context.newPage();
            page.on('pageerror', err => console.log(`[${label} pageerror]`, String(err)));
            await page.goto('https://oukkhmer.web.app/', { waitUntil: 'load', timeout: 45000 });
            await page.waitForTimeout(2500);
            await page.click('#startBtn');
            await page.waitForTimeout(300);
            await page.click('#loginSubmitBtn');
            await page.waitForTimeout(1200);
            return page;
          }

          async function goToOnlineIdle(page) {
            await page.click('#pickPlay');
            await page.waitForTimeout(200);
            await page.click('#pickOnline');
            await page.waitForTimeout(200);
          }

          async function waitForOnline(page, label, maxSeconds) {
            for (let i = 0; i < maxSeconds; i++) {
              await page.waitForTimeout(1000);
              const m = await page.evaluate(() => window.__ouk.currentMode());
              if (m === 'online') { console.log(label, 'reached online at t+' + (i + 1) + 's'); return true; }
            }
            return false;
          }

          async function main() {
            const browser = await chromium.launch();
            const ctxA = await browser.newContext();
            const ctxB = await browser.newContext();
            const pageA = await loginAsGuest(ctxA, 'A');
            const pageB = await loginAsGuest(ctxB, 'B');
            await goToOnlineIdle(pageA);
            await goToOnlineIdle(pageB);
            await pageA.click('#onlineQuickBtn');
            await pageA.waitForTimeout(800);
            await pageB.click('#onlineQuickBtn');
            const okA = await waitForOnline(pageA, 'A', 12);
            const okB = await waitForOnline(pageB, 'B', 12);
            console.log('MATCHED:', okA && okB);
            if (!okA || !okB) { await browser.close(); process.exit(1); }

            // --- End Session: A ends it, B should see the balloon ---
            const endBtnVisibleA = await pageA.evaluate(() => getComputedStyle(document.getElementById('onlineEndBtn')).display !== 'none');
            console.log('A onlineEndBtn visible:', endBtnVisibleA);
            await pageA.click('#onlineEndBtn');
            await pageA.waitForTimeout(300);
            const confirmVisible = await pageA.evaluate(() => document.getElementById('onlineEndConfirmPopup').style.display === 'flex');
            console.log('A confirm popup visible:', confirmVisible);
            await pageA.click('#onlineEndConfirmYes');
            await pageA.waitForTimeout(300);
            const aBackAtModeScreen = await pageA.evaluate(() => document.getElementById('modeScreen').style.display === 'flex');
            console.log('A back at mode screen after confirming end:', aBackAtModeScreen);

            let balloonSeen = false;
            for (let i = 0; i < 10; i++) {
              await pageB.waitForTimeout(1000);
              const b = await pageB.evaluate(() => ({
                shown: document.getElementById('onlineBalloon').classList.contains('show'),
                text: document.getElementById('onlineBalloon').textContent,
              }));
              if (b.shown) { console.log('B balloon at t+' + (i + 1) + 's:', JSON.stringify(b)); balloonSeen = true; break; }
            }
            console.log('BALLOON SEEN BY B:', balloonSeen);

            // --- Presence/offline: a fresh pair, one side closes its tab
            //     entirely (real "went offline", not just End Session) ---
            const ctxC = await browser.newContext();
            const ctxD = await browser.newContext();
            const pageC = await loginAsGuest(ctxC, 'C');
            const pageD = await loginAsGuest(ctxD, 'D');
            await goToOnlineIdle(pageC);
            await goToOnlineIdle(pageD);
            await pageC.click('#onlineQuickBtn');
            await pageC.waitForTimeout(800);
            await pageD.click('#onlineQuickBtn');
            const okC = await waitForOnline(pageC, 'C', 12);
            const okD = await waitForOnline(pageD, 'D', 12);
            console.log('SECOND PAIR MATCHED:', okC && okD);
            if (okC && okD) {
              await ctxD.close(); // D "goes offline" -- no more heartbeats, no clean End Session
              let wentOffline = false;
              for (let i = 0; i < 45; i++) {
                await pageC.waitForTimeout(1000);
                const st = await pageC.evaluate(() => {
                  const oppId = window.__ouk.currentSide() === 0 ? 'scoreB' : 'scoreW';
                  const card = document.getElementById(oppId);
                  return { offline: card.classList.contains('offline'), title: card.title };
                });
                if (st.offline) { console.log('C sees D offline at t+' + (i + 1) + 's:', JSON.stringify(st)); wentOffline = true; break; }
              }
              console.log('OFFLINE GRAYOUT DETECTED:', wentOffline);
            }

            await browser.close();
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          EOF
          node test.js
