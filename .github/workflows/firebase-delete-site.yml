name: Delete Firebase Hosting site
on:
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Firebase Hosting site ID to delete'
        required: true
jobs:
  delete_site:
    runs-on: ubuntu-latest
    steps:
      # hosting:sites:delete (unlike hosting:sites:create) requires being
      # run from a directory with a firebase.json present, or it fails
      # with "Not in a Firebase app directory" -- checkout provides that.
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
      - run: npx firebase-tools@latest hosting:sites:delete "${{ inputs.site_id }}" --project khmer-ouk-datacollection --force
