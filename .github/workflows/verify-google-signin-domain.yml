name: Verify Google sign-in domain fix (one-off)
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.47.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Click "sign up with Google" for real and see whether the popup reaches Google
        run: |
          cat > test.js <<'EOF'
          const { chromium } = require('playwright');

          async function main() {
            const browser = await chromium.launch();
            const context = await browser.newContext();
            const page = await context.newPage();

            await page.goto('https://oukkhmer.web.app/', { waitUntil: 'load' });
            await page.waitForTimeout(3000);
            await page.click('#startBtn');
            await page.waitForTimeout(500);

            const popupPromise = context.waitForEvent('page', { timeout: 8000 }).catch(() => null);

            // Direct call (not a click) with a manual timeout guard: if the
            // domain check now passes, this may hang forever waiting on a
            // real human at the Google popup, which a headless run can
            // never provide -- a timeout here is expected and fine, an
            // unauthorized-domain rejection is what we're checking is gone.
            const timeout = new Promise((resolve) => setTimeout(() => resolve({ ok: false, code: 'TIMEOUT' }), 8000));
            const call = page.evaluate(() => window.__oukAuth.signInGoogle()
              .then(() => ({ ok: true }))
              .catch((err) => ({ ok: false, code: err && err.code, message: err && err.message })));
            const result = await Promise.race([call, timeout]);
            console.log('signInGoogle RESULT:', JSON.stringify(result));

            const popup = await popupPromise;
            if (popup) {
              await popup.waitForLoadState('domcontentloaded').catch(() => {});
              console.log('POPUP OPENED, URL:', popup.url());
              console.log('REACHED GOOGLE:', popup.url().includes('accounts.google.com'));
              await popup.close().catch(() => {});
            } else {
              console.log('NO POPUP EVENT SEEN');
            }

            await browser.close();
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          EOF
          node test.js
