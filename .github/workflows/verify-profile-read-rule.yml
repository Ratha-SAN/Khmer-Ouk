name: Verify profile read rule (one-off)
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.47.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Live sign-in + profile save + read-back test against oukkhmer.web.app
        run: |
          cat > test.js <<'EOF'
          const { chromium } = require('playwright');

          async function main() {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const errors = [];
            page.on('pageerror', (e) => errors.push(String(e)));
            page.on('console', (m) => { if (m.type() === 'error') errors.push(m.text()); });

            await page.goto('https://oukkhmer.web.app/', { waitUntil: 'load' });
            await page.waitForTimeout(3000);
            await page.click('#startBtn');
            await page.waitForTimeout(500);
            await page.click('#loginSubmitBtn');

            // The very first anonymous sign-in on a cold connection can take
            // a few seconds to settle -- poll rather than a fixed wait.
            let authState = null;
            for (let i = 0; i < 15; i++) {
              await page.waitForTimeout(1000);
              authState = await page.evaluate(() => window.__oukAuth.getState());
              if (authState && authState.signedIn && authState.uid) break;
            }
            console.log('AUTH STATE:', JSON.stringify(authState));
            if (!authState || !authState.uid) { console.log('Never signed in -- aborting.'); process.exit(1); }

            // Save a distinctive display name via the profile screen so we can
            // confirm the read-back actually returns THIS write, not stale data.
            const marker = 'ruletest-' + Date.now();
            await page.click('#profileEntryBtn');
            await page.waitForTimeout(300);
            await page.fill('#profileDisplayName', marker);
            await page.click('#profileSaveBtn');
            await page.waitForTimeout(1500);

            // Directly exercise fetchProfile -- this is the exact call gated by
            // the Firestore "allow read" rule on users/{uid}.
            const fetched = await page.evaluate((uid) => window.__oukAuth.fetchProfile(uid), authState.uid);
            console.log('FETCHED PROFILE:', JSON.stringify(fetched));
            console.log('READ RULE WORKING:', fetched && fetched.displayName === marker);

            console.log('ERRORS:', JSON.stringify(errors.filter(e => !e.includes('favicon'))));
            await browser.close();
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          EOF
          node test.js
