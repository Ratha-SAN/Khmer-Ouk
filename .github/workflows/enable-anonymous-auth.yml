name: Enable anonymous auth (one-off)
on:
  workflow_dispatch:

jobs:
  enable:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Check + enable Anonymous sign-in
        run: |
          TOKEN=$(gcloud auth application-default print-access-token)
          PROJECT=khmer-ouk-datacollection

          echo "=== GET config ==="
          GET_RESP=$(curl -sS -X GET \
            "https://identitytoolkit.googleapis.com/v2/projects/$PROJECT/config" \
            -H "Authorization: Bearer $TOKEN")
          echo "$GET_RESP"

          echo "=== PATCH: enable anonymous ==="
          PATCH_RESP=$(curl -sS -X PATCH \
            "https://identitytoolkit.googleapis.com/v2/projects/$PROJECT/config?updateMask=signIn.anonymous.enabled" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"signIn":{"anonymous":{"enabled":true}}}')
          echo "$PATCH_RESP"

          echo "=== GET config (after) ==="
          curl -sS -X GET \
            "https://identitytoolkit.googleapis.com/v2/projects/$PROJECT/config" \
            -H "Authorization: Bearer $TOKEN"
