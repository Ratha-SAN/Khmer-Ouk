name: Fix authorized domain for Google/Apple sign-in (one-off)
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Add oukkhmer.web.app to authorizedDomains
        run: |
          TOKEN=$(gcloud auth application-default print-access-token)
          PROJECT=khmer-ouk-datacollection

          echo "=== GET config (before) ==="
          curl -sS -X GET \
            "https://identitytoolkit.googleapis.com/v2/projects/$PROJECT/config" \
            -H "Authorization: Bearer $TOKEN" | tee before.json

          echo "=== PATCH: add oukkhmer.web.app ==="
          curl -sS -X PATCH \
            "https://identitytoolkit.googleapis.com/v2/projects/$PROJECT/config?updateMask=authorizedDomains" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"authorizedDomains":["localhost","khmer-ouk-datacollection.firebaseapp.com","khmer-ouk-datacollection.web.app","oukkhmer.web.app"]}'

          echo "=== GET config (after) ==="
          curl -sS -X GET \
            "https://identitytoolkit.googleapis.com/v2/projects/$PROJECT/config" \
            -H "Authorization: Bearer $TOKEN"
