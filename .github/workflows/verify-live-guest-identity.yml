name: Verify live guest identity (one-off)
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.47.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium

      - name: Live login test against oukkhmer.web.app
        run: |
          cat > test.js <<'EOF'
          const { chromium } = require('playwright');

          async function main() {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const errors = [];
            page.on('pageerror', (e) => errors.push(String(e)));
            page.on('console', (m) => { if (m.type() === 'error') errors.push(m.text()); });
            page.on('requestfailed', (r) => console.log('REQUEST FAILED:', r.url(), r.failure() && r.failure().errorText));
            page.on('response', (r) => {
              const u = r.url();
              if (u.includes('identitytoolkit') || u.includes('firestore')) {
                console.log('RESPONSE:', r.status(), u);
              }
            });

            await page.goto('https://oukkhmer.web.app/', { waitUntil: 'load' });
            await page.waitForTimeout(3000);

            console.log('firebase defined:', await page.evaluate(() => typeof window.firebase !== 'undefined'));
            console.log('__oukAuth signInGuest is stub?', await page.evaluate(() => window.__oukAuth.signInGuest.toString().includes('Firebase unavailable')));

            await page.click('#startBtn');
            await page.waitForTimeout(500);
            await page.click('#loginSubmitBtn');

            for (let i = 0; i < 8; i++) {
              await page.waitForTimeout(1000);
              const s = await page.evaluate(() => window.__oukAuth.getState());
              console.log(`AUTH STATE @${i + 1}s:`, JSON.stringify(s));
            }

            console.log('ERRORS:', JSON.stringify(errors.filter(e => !e.includes('favicon'))));

            const authState = await page.evaluate(() => window.__oukAuth.getState());
            await browser.close();
            require('fs').writeFileSync('auth_state.json', JSON.stringify(authState));
          }
          main().catch((e) => { console.error(e); process.exit(1); });
          EOF
          node test.js

      - name: Check Firestore users collection for the new UID
        run: |
          GUEST_UID=$(node -e "console.log(JSON.parse(require('fs').readFileSync('auth_state.json')).uid)")
          echo "Looking up uid: $GUEST_UID"
          if [ "$GUEST_UID" = "null" ]; then
            echo "No uid to look up (login never succeeded); skipping Firestore check."
            exit 0
          fi
          TOKEN=$(gcloud auth application-default print-access-token)
          curl -sS -X GET \
            "https://firestore.googleapis.com/v1/projects/khmer-ouk-datacollection/databases/(default)/documents/users/$GUEST_UID" \
            -H "Authorization: Bearer $TOKEN"
