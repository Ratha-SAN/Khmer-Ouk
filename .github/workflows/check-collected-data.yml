name: One-off - Report data collected in Firestore
on: workflow_dispatch
jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
      - name: Query Firestore via REST API
        run: |
          set -euo pipefail
          PROJECT=khmer-ouk-datacollection
          BASE="https://firestore.googleapis.com/v1/projects/$PROJECT/databases/(default)/documents"
          TOKEN=$(gcloud auth application-default print-access-token)

          count_of() {
            curl -sS -X POST -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              -d "{\"structuredAggregationQuery\":{\"aggregations\":[{\"alias\":\"count\",\"count\":{}}],\"structuredQuery\":{\"from\":[{\"collectionId\":\"$1\"}]}}}" \
              "https://firestore.googleapis.com/v1/projects/$PROJECT/databases/(default)/documents:runAggregationQuery" \
              | jq -r '.[0].result.aggregateFields.count.integerValue // "0"'
          }

          echo "=== sessions collection ==="
          echo "Total count: $(count_of sessions)"
          echo "--- sample of up to 20 docs ---"
          curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/sessions?pageSize=20" | jq '.'

          echo ""
          echo "=== users collection ==="
          echo "Total count: $(count_of users)"
          echo "--- sample of up to 20 docs ---"
          curl -sS -H "Authorization: Bearer $TOKEN" "$BASE/users?pageSize=20" | jq '.'
